<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>德州扑克 (前端界面)</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0a3d1f 0%, #1a5c2c 50%, #0f3d21 100%);
            color: #f1f1f1;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            background-attachment: fixed;
        }
        .container {
            width: 95%;
            max-width: 1400px;
            background-color: rgba(0, 0, 0, 0.7);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.8);
            border: 3px solid #D4AF37;
            overflow: visible;
            backdrop-filter: blur(5px);
        }
        h1 {
            text-align: center;
            color: #FFD700;
            margin-top: 0;
            margin-bottom: 15px;  /* 减少底部边距 */
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.8);
            font-size: 2.5em;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(to right, #FFD700, #FFA500);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            position: relative;
        }
        h1::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 25%;
            width: 50%;
            height: 3px;
            background: linear-gradient(to right, transparent, #D4AF37, transparent);
            border-radius: 2px;
        }
        .game-info {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 25px;
            padding: 15px 20px;
            background: rgba(30, 60, 40, 0.8);
            border-radius: 15px;
            border: 2px solid #4CAF50;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }
        .info-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .info-label {
            font-size: 0.85em;
            color: #aaffaa;
            margin-bottom: 5px;
            font-weight: 600;
        }
        .info-value {
            font-size: 1.3em;
            color: #FFD700;
            font-weight: bold;
            text-shadow: 0 0 8px rgba(255, 215, 0, 0.5);
        }
        .game-status {
            background-color: rgba(30, 60, 40, 0.9);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 25px;
            text-align: center;
            font-size: 1.2em;
            border: 1px solid #4CAF50;
        }
        .winners-section {
            background: linear-gradient(135deg, rgba(139, 0, 139, 0.9), rgba(75, 0, 130, 0.9));
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            border: 3px solid #FFD700;
            animation: pulse 2s infinite;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.4);
        }
        .winners-section h2 {
            text-align: center;
            margin-top: 0;
            color: #FFD700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
            font-size: 1.8em;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 5px #FFD700; }
            50% { box-shadow: 0 0 20px #FFD700; }
            100% { box-shadow: 0 0 5px #FFD700; }
        }
        .community-cards-section, .player-section {
            background-color: rgba(40, 40, 40, 0.85);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 25px;
            border: 1px solid #666;
        }
        h2 {
            color: #4CAF50;
            border-bottom: 2px solid #4CAF50;
            padding-bottom: 8px;
            margin-top: 0;
        }
        .cards-container {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            min-height: 120px;
            padding: 15px;
            justify-content: center;
            align-items: center;
            background-color: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
        }
        .card {
            width: 80px;
            height: 112px;
            background-color: white;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 2.2em;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            border: 1px solid #ccc;
            color: #333;
            position: relative;
        }
        .card.red { color: #D22; }
        .card.black { color: #222; }
        .card.placeholder {
            background-color: #2a2a2a;
            color: #666;
            border: 2px dashed #666;
            font-size: 1.5em;
        }
        .card.winning-card {
            border: 3px solid #FFD700;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.7);
        }
        .player-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 10px 15px;
            background-color: rgba(60, 80, 60, 0.7);
            border-radius: 10px;
            transition: all 0.3s;
        }
        .player-info.winner {
            background-color: rgba(139, 0, 139, 0.7);
            border: 2px solid #FFD700;
        }
        .player-name {
            font-weight: bold;
            font-size: 1.3em;
        }
        .player-stack, .player-bet, .player-status {
            font-size: 1.1em;
            color: #FFD700;
        }
        .player-hand-rank {
            font-size: 1em;
            color: #66ccff;
            font-style: italic;
            margin-left: 10px;
        }
        /* 标题区域布局 - 按钮在标题左侧 */
        .game-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            margin-bottom: 20px;
            position: relative;
        }

        .header-controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            left: 10px;
            position: relative;
        }

        .header-controls button {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #9C27B0, #7B1FA2);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9em;
            box-shadow: 0 4px 12px rgba(156, 39, 176, 0.3);
            min-width: 120px;
        }

        .header-controls button:hover {
            background: linear-gradient(135deg, #7B1FA2, #9C27B0);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(156, 39, 176, 0.4);
        }

        .header-controls button:active {
            transform: translateY(0);
        }
        button {
            padding: 16px 32px;
            font-size: 1.1em;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            min-width: 150px;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }
        button:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }
        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        button:active {
            transform: translateY(-1px);
        }
        #btn-fold { 
            background: linear-gradient(135deg, #f44336, #d32f2f); 
            color: white; 
            box-shadow: 0 4px 12px rgba(244, 67, 54, 0.3);
        }
        #btn-check, #btn-call { 
            background: linear-gradient(135deg, #2196F3, #1976D2); 
            color: white; 
            box-shadow: 0 4px 12px rgba(33, 150, 243, 0.3);
        }
        #btn-bet, #btn-raise { 
            background: linear-gradient(135deg, #4CAF50, #388E3C); 
            color: white; 
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
        }
        #btn-start, #btn-reset { 
            background: linear-gradient(135deg, #9C27B0, #7B1FA2); 
            color: white; 
            box-shadow: 0 4px 12px rgba(156, 39, 176, 0.3);
        }
        .bet-input-section {
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }
        input[type="number"] {
            padding: 12px;
            font-size: 1.1em;
            width: 150px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }
        .log {
            background: rgba(0, 0, 0, 0.85);
            padding: 20px;
            border-radius: 15px;
            margin-top: 40px;
            height: 250px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
            border: 2px solid #444;
            color: #aaffaa;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(3px);
        }
        .log h3 {
            margin-top: 0;
            color: #FFD700;
            border-bottom: 2px solid #FFD700;
            padding-bottom: 10px;
            font-size: 1.3em;
        }
        .log p {
            margin: 5px 0;
        }
        .log .info { color: #aaffaa; }
        .log .action { color: #66ccff; }
        .log .win { color: #FFD700; font-weight: bold; }
        .log .error { color: #ff6666; }
        .hand-details {
            font-size: 0.9em;
            color: #aaa;
            margin-top: 5px;
        }

        /* 牌桌布局样式 */
        .poker-table {
            position: relative;
            width: 800px;
            height: 500px;
            background: radial-gradient(ellipse at center, #2a6c3c 0%, #0a3d1f 60%, #051f14 100%);
            border-radius: 250px;
            margin: 40px auto;
            border: 15px solid #8B4513;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.9);
            z-index: 1;
        }

        .player-seat {
            position: absolute;
            width: 180px;
            height: 130px;
            background: linear-gradient(135deg, rgba(40, 40, 40, 0.95), rgba(30, 30, 30, 0.95));
            border-radius: 15px;
            border: 3px solid #666;
            padding: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 20;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.6);
        }

        .player-seat.active {
            border: 4px solid #FFD700;
            background: rgba(100, 100, 60, 0.9);
            transform: scale(1.08);
            z-index: 2;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .player-seat.winner {
            background: rgba(139, 0, 139, 0.8);
            border: 4px solid #FFD700;
        }

        .player-seat.human {
            border: 4px solid #4CAF50;
            background: rgba(60, 80, 60, 0.9);
        }

        .player-name {
            font-weight: bold;
            font-size: 1.2em;
            margin-bottom: 8px;
            text-align: center;
            letter-spacing: 0.5px;
        }

        .player-info-line {
            font-size: 0.85em;
            margin: 3px 0;
            color: #FFD700;
        }

        .player-hand {
            font-size: 0.75em;
            color: #66ccff;
            text-align: center;
            margin-top: 6px;
            font-family: monospace;
            font-weight: bold;
        }

        .player-status {
            font-size: 0.75em;
            text-align: center;
            margin-top: 4px;
            font-style: italic;
        }

        .player-robot {
            color: #ff6b6b;
        }

        .player-human {
            color: #4CAF50;
        }

        /* 优化后的3个玩家位置 - 调整以避免与公共牌重叠 */
        .seat-0 { bottom: 20px; left: 40%; transform: translateX(-40%); z-index: 30; }  /* 玩家0：人类 - 下方，略微下移 */
        .seat-1 { top: 50%; left: 0px; transform: translateY(-50%); }  /* 玩家1：机器人 - 左侧，向外移动避免重叠 */
        .seat-2 { top: 50%; right: 0px; transform: translateY(-50%); }  /* 玩家2：机器人 - 右侧，向外移动避免重叠 */

        /* 荷官区域 - 整合游戏信息，位于牌桌和公共牌中间 */
        .dealer-area {
            position: absolute;
            top: 5%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 15px 30px;
            border-radius: 25px;
            border: 3px solid #D4AF37;
            text-align: center;
            z-index: 10;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
            min-width: 400px;
        }

        .dealer-label {
            color: #FFD700;
            font-weight: bold;
            font-size: 1.2em;
            text-shadow: 0 0 5px rgba(255, 215, 0, 0.5);
            margin-bottom: 10px;
        }

        .dealer-game-info {
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 10px;
        }

        .dealer-info-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .dealer-info-label {
            font-size: 0.8em;
            color: #4CAF50;
            margin-bottom: 2px;
        }

        .dealer-info-value {
            font-size: 0.9em;
            color: #FFD700;
            font-weight: bold;
        }

        /* 用户操作面板 - 放置在界面右下角 */
        .player-action-panel {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 25;
            background: rgba(0, 0, 0, 0.9);
            border-radius: 15px;
            padding: 15px;
            border: 2px solid #D4AF37;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            min-width: 200px;
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .action-buttons button {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9em;
        }

        .action-buttons button:hover:not(:disabled) {
            background: linear-gradient(135deg, #45a049, #4CAF50);
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        .action-buttons button:disabled {
            background: #666;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .action-buttons #btn-fold {
            background: linear-gradient(135deg, #f44336, #d32f2f);
        }

        .action-buttons #btn-fold:hover:not(:disabled) {
            background: linear-gradient(135deg, #d32f2f, #f44336);
        }

        .action-buttons #btn-check, .action-buttons #btn-call {
            background: linear-gradient(135deg, #2196F3, #1976D2);
        }

        .action-buttons #btn-check:hover:not(:disabled), 
        .action-buttons #btn-call:hover:not(:disabled) {
            background: linear-gradient(135deg, #1976D2, #2196F3);
        }

        .action-buttons #btn-bet, .action-buttons #btn-raise {
            background: linear-gradient(135deg, #FF9800, #F57C00);
        }

        .action-buttons #btn-bet:hover:not(:disabled), 
        .action-buttons #btn-raise:hover:not(:disabled) {
            background: linear-gradient(135deg, #F57C00, #FF9800);
        }

        .bet-input-section {
            margin-top: 15px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .bet-input-section label {
            display: block;
            color: #FFD700;
            margin-bottom: 5px;
            font-size: 0.9em;
        }

        .bet-input-section input {
            width: 100%;
            padding: 8px;
            border: 1px solid #D4AF37;
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            margin-bottom: 8px;
        }

        .bet-input-section #btn-confirm-bet {
            width: 100%;
            padding: 8px;
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .bet-input-section #btn-confirm-bet:hover {
            background: linear-gradient(135deg, #45a049, #4CAF50);
        }

        /* 公共牌区域 */
        .community-cards-area {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 520px;  /* 放大宽度以容纳5张牌 */
            height: 160px; /* 放大高度以容纳牌的高度 */
            background: rgba(0, 0, 0, 0.6);
            border-radius: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 4px solid #D4AF37;
            z-index: 5;
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.3);
        }

        .community-cards {
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: center;
        }

        .game-layout {
            position: relative;
            width: 100%;
            max-width: 900px;
            margin: 10px auto;  /* 减少顶部边距 */
            padding-bottom: 120px;  /* 增加底部间距，确保玩家与按钮不重叠 */
        }

        /* 隐藏游戏日志区域 */
        .log {
            display: none;
        }

        @media (max-width: 768px) {
            .poker-table {
                width: 90vw;
                height: 60vw;
                border-radius: 30vw;
            }
            
            .player-seat {
                width: 130px;
                height: 90px;
                font-size: 0.75em;
                padding: 8px;
            }
            
            .community-cards-area {
                width: 350px;
                height: 120px;
            }
        }
    </style>
</head>
<body>
        <div class="container">
            <div class="game-header">
                <div class="header-controls">
                    <button id="btn-start">开始新游戏</button>
                    <button id="btn-reset">重置服务器</button>
                </div>
                <h1>♠️ ♥️ 德州扑克 ♣️ ♦️</h1>
            </div>

        <div id="winners-container" class="winners-section" style="display: none;">
            <h2>🏆 获胜者 🏆</h2>
            <div id="winners-list">
                <!-- 获胜者信息将在这里显示 -->
            </div>
        </div>

        <div class="game-layout">
            <div class="poker-table">
                <!-- 荷官区域 - 整合游戏信息 -->
                <div class="dealer-area">
                    <div class="dealer-label">荷官</div>
                    <div class="dealer-game-info">
                        <div class="dealer-info-item">
                            <span class="dealer-info-label">游戏状态</span>
                            <span class="dealer-info-value" id="game-state">等待游戏开始</span>
                        </div>
                        <div class="dealer-info-item">
                            <span class="dealer-info-label">当前底池</span>
                            <span class="dealer-info-value" id="pot-amount">0</span>
                        </div>
                        <div class="dealer-info-item">
                            <span class="dealer-info-label">下注额</span>
                            <span class="dealer-info-value" id="current-bet">0</span>
                        </div>
                        <div class="dealer-info-item">
                            <span class="dealer-info-label">行动玩家</span>
                            <span class="dealer-info-value" id="active-player">-</span>
                        </div>
                    </div>
                </div>

                <!-- 公共牌区域 -->
                <div class="community-cards-area">
                    <div class="community-cards" id="community-cards">
                        <!-- 公共牌将由JS动态生成 -->
                    </div>
                </div>

                <!-- 围绕牌桌的玩家座位 -->
                <div class="player-seat seat-0" id="seat-0">
                    <!-- 玩家0（人类玩家 - 下方） -->
                </div>
                
                <!-- 用户操作面板 - 放置在用户右侧 -->
                <div class="player-action-panel" id="player-action-panel">
                    <div class="action-buttons">
                        <button id="btn-fold" disabled>弃牌</button>
                        <button id="btn-check" disabled>过牌</button>
                        <button id="btn-call" disabled>跟注</button>
                        <button id="btn-bet" disabled>下注</button>
                        <button id="btn-raise" disabled>加注</button>
                    </div>
                    <div class="bet-input-section" id="bet-controls" style="display: none;">
                        <label for="bet-amount">下注/加注额度:</label>
                        <input type="number" id="bet-amount" min="1" value="20">
                        <button id="btn-confirm-bet">确认下注</button>
                    </div>
                </div>
                
                <div class="player-seat seat-1" id="seat-1">
                    <!-- 玩家1（机器人 - 左侧） -->
                </div>
                <div class="player-seat seat-2" id="seat-2">
                    <!-- 玩家2（机器人 - 右侧，庄家位） -->
                </div>
            </div>
        </div>



        <div class="log">
            <h3>游戏日志</h3>
            <div id="log-content">
                <p class="info">前端已加载。请点击"开始新游戏"。</p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://127.0.0.1:5000/api'; // 后端API地址

        // DOM 元素
        const dom = {
            gameState: document.getElementById('game-state'),
            potAmount: document.getElementById('pot-amount'),
            currentBet: document.getElementById('current-bet'),
            activePlayer: document.getElementById('active-player'),
            communityCards: document.getElementById('community-cards'),
            playersContainer: document.getElementById('players-container'),
            winnersContainer: document.getElementById('winners-container'),
            winnersList: document.getElementById('winners-list'),
            betControls: document.getElementById('bet-controls'),
            betAmount: document.getElementById('bet-amount'),
            btnConfirmBet: document.getElementById('btn-confirm-bet'),
            logContent: document.getElementById('log-content'),
            btnStart: document.getElementById('btn-start'),
            btnFold: document.getElementById('btn-fold'),
            btnCheck: document.getElementById('btn-check'),
            btnBet: document.getElementById('btn-bet'),
            btnCall: document.getElementById('btn-call'),
            btnRaise: document.getElementById('btn-raise'),
            btnReset: document.getElementById('btn-reset')
        };

        // 按钮事件监听
        dom.btnStart.addEventListener('click', startNewGame);
        dom.btnFold.addEventListener('click', () => takeAction('fold'));
        dom.btnCheck.addEventListener('click', () => takeAction('check'));
        dom.btnBet.addEventListener('click', showBetInput);
        dom.btnCall.addEventListener('click', () => takeAction('call'));
        dom.btnRaise.addEventListener('click', showBetInput);
        dom.btnReset.addEventListener('click', resetServer);
        dom.btnConfirmBet.addEventListener('click', confirmBetAction);

        // 工具函数：添加日志
        function addLog(message, type = 'info') {
            const p = document.createElement('p');
            p.className = type;
            p.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            dom.logContent.appendChild(p);
            dom.logContent.scrollTop = dom.logContent.scrollHeight;
        }

        // 工具函数：API调用
        async function callApi(endpoint, method = 'GET', body = null) {
            const options = { method, headers: { 'Content-Type': 'application/json' } };
            if (body) options.body = JSON.stringify(body);
            try {
                const response = await fetch(`${API_BASE_URL}${endpoint}`, options);
                const data = await response.json();
                if (!response.ok) {
                    addLog(`API错误 (${response.status}): ${data.error || '未知错误'}`, 'error');
                    return null;
                }
                return data;
            } catch (error) {
                addLog(`网络请求失败: ${error.message}`, 'error');
                return null;
            }
        }

        // 1. 获取并更新游戏状态
        async function updateGameState() {
            const data = await callApi('/game/state');
            if (!data) return;
            renderGameState(data);
        }

        // 2. 渲染游戏状态
        function renderGameState(state) {
            dom.gameState.textContent = state.game_state;
            dom.potAmount.textContent = state.pot;
            dom.currentBet.textContent = state.current_bet;
            dom.activePlayer.textContent = state.players[state.active_player_index]?.name || '-';

            // 渲染公共牌
            dom.communityCards.innerHTML = '';
            state.community_cards.forEach(card => {
                const cardDiv = document.createElement('div');
                cardDiv.className = `card ${card.color}`;
                cardDiv.textContent = card.symbol;
                dom.communityCards.appendChild(cardDiv);
            });
            // 补充空位牌
            for (let i = state.community_cards.length; i < 5; i++) {
                const cardDiv = document.createElement('div');
                cardDiv.className = 'card placeholder';
                cardDiv.textContent = '?';
                dom.communityCards.appendChild(cardDiv);
            }

            // 渲染获胜者信息
            if (state.winners && state.winners.length > 0) {
                dom.winnersContainer.style.display = 'block';
                dom.winnersList.innerHTML = '';
                state.winners.forEach(winner => {
                    const winnerDiv = document.createElement('div');
                    winnerDiv.style.cssText = 'padding: 10px; margin: 5px 0; background-color: rgba(255, 215, 0, 0.2); border-radius: 5px;';
                    winnerDiv.innerHTML = `
                        <strong>${winner.player_name}</strong> 赢得 <span style="color: #FFD700">${winner.amount}</span> 筹码
                        ${winner.hand_description ? `<br><span style="font-size: 0.9em; color: #66ccff">${winner.hand_description}</span>` : ''}
                    `;
                    dom.winnersList.appendChild(winnerDiv);
                });
                addLog(`游戏结束！${state.winners.map(w => w.player_name).join(', ')} 获胜！`, 'win');
            } else {
                dom.winnersContainer.style.display = 'none';
            }

            // 渲染玩家信息（围绕牌桌布局）
            renderPlayersAroundTable(state);

            // 更新按钮状态
            updateButtonStates(state);
        }

        // 2.1 渲染玩家围绕牌桌布局
        function renderPlayersAroundTable(state) {
            // 清空所有座位（3个玩家：0=人类，1-2=机器人）
            for (let i = 0; i < 3; i++) {
                const seat = document.getElementById(`seat-${i}`);
                if (seat) {
                    seat.innerHTML = '';
                    seat.className = 'player-seat';
                    seat.classList.add(`seat-${i}`);
                }
            }

            // 渲染每个玩家
            state.players.forEach((player, index) => {
                const seat = document.getElementById(`seat-${index}`);
                if (!seat) return;

                // 设置座位状态
                if (index === state.active_player_index) {
                    seat.classList.add('active');
                }
                
                // 检查是否是获胜者
                if (state.winners) {
                    const isWinner = state.winners.some(w => w.player_id === player.id);
                    if (isWinner) {
                        seat.classList.add('winner');
                    }
                }

                // 设置玩家类型（人类/机器人）
                if (index === 0) {
                    seat.classList.add('human');
                } else {
                    seat.classList.add('robot');
                }
                
                // 根据位置设置玩家标签
                const positionLabel = index === 0 ? '(你)' : 
                                     index === 1 ? '(机器人-左)' :
                                     '(机器人-右，庄家)';

                // 构建手牌显示：人类玩家始终可见，机器人只在摊牌阶段可见
                let handDisplay = '??';
                let handRevealed = false;
                if (player.hand && player.hand.length > 0) {
                    if (state.game_state === 'showdown' || state.game_state === 'ended' || index === 0) {
                        handDisplay = player.hand.map(c => c.symbol).join(' ');
                        handRevealed = true;
                    }
                }

                // 构建玩家信息HTML
                seat.innerHTML = `
                    <div class="player-name ${index === 0 ? 'player-human' : 'player-robot'}">
                        ${player.name} ${positionLabel}
                    </div>
                    <div class="player-info-line">筹码: ${player.stack}</div>
                    <div class="player-info-line">下注: ${player.bet}</div>
                    <div class="player-hand">${handDisplay}</div>
                    <div class="player-status">${player.status}</div>
                    ${player.hand_rank && handRevealed ? `<div class="player-hand-rank">${player.hand_description}</div>` : ''}
                `;
            });
        }

        // 3. 更新按钮状态
        function updateButtonStates(state) {
            const isGameActive = state.game_state !== 'ended' && state.game_state !== 'showdown';
            const isPlayerTurn = state.players[state.active_player_index]?.status === 'active';
            
            // 启用/禁用动作按钮
            dom.btnFold.disabled = !isGameActive || !isPlayerTurn;
            dom.btnCheck.disabled = !isGameActive || !isPlayerTurn;
            dom.btnBet.disabled = !isGameActive || !isPlayerTurn;
            dom.btnCall.disabled = !isGameActive || !isPlayerTurn;
            dom.btnRaise.disabled = !isGameActive || !isPlayerTurn;
            
            // 开始按钮状态
            dom.btnStart.disabled = isGameActive && state.game_state !== 'idle';
        }

        // 4. 开始新游戏
        async function startNewGame() {
            addLog('请求开始新游戏...', 'action');
            const data = await callApi('/game/start', 'POST');
            if (data) {
                addLog(`新游戏开始！玩家: ${data.players.map(p => p).join(', ')}`, 'info');
                updateGameState();
            }
        }

        // 5. 执行动作（弃牌、过牌、跟注）
        async function takeAction(action) {
            addLog(`执行动作: ${action}`, 'action');
            const data = await callApi('/game/action', 'POST', { action });
            if (data) {
                if (data.success) {
                    addLog(`动作"${action}"成功。${data.message}`, 'info');
                } else {
                    addLog(`动作失败: ${data.message}`, 'error');
                }
                updateGameState();
            }
        }

        // 6. 显示下注输入框
        function showBetInput() {
            dom.betControls.style.display = 'flex';
            addLog('请输入下注/加注额度。', 'info');
        }

        // 7. 确认下注/加注
        async function confirmBetAction() {
            const amount = parseInt(dom.betAmount.value);
            if (isNaN(amount) || amount <= 0) {
                addLog('请输入有效的正数金额。', 'error');
                return;
            }
            addLog(`执行下注/加注: ${amount}`, 'action');
            const data = await callApi('/game/action', 'POST', { action: 'bet', amount });
            if (data) {
                if (data.success) {
                    addLog(`下注"${amount}"成功。${data.message}`, 'info');
                } else {
                    addLog(`下注失败: ${data.message}`, 'error');
                }
                dom.betControls.style.display = 'none';
                updateGameState();
            }
        }

        // 8. 重置服务器
        async function resetServer() {
            const confirmed = confirm('这将重置后端所有游戏数据。确定吗？');
            if (!confirmed) return;
            addLog('重置服务器...', 'action');
            const data = await callApi('/reset', 'POST');
            if (data) {
                addLog('服务器已重置。', 'info');
                // 重置显示状态
                dom.winnersContainer.style.display = 'none';
                renderGameState({
                    game_state: '等待游戏开始',
                    pot: 0,
                    current_bet: 0,
                    active_player_index: 0,
                    community_cards: [],
                    players: []
                });
            }
        }

        // 机器人AI逻辑
        async function robotAI(playerIndex, state) {
            const player = state.players[playerIndex];
            if (!player || player.status !== 'active') return;

            // 等待一段时间让玩家看到机器人思考
            await new Promise(resolve => setTimeout(resolve, 1500));

            // 简单的AI策略
            const callAmount = state.current_bet - player.bet;
            const canCall = callAmount <= player.stack;
            
            // 随机决策，基于手牌强度
            const handStrength = calculateHandStrength(player, state);
            const randomFactor = Math.random();

            let action = 'fold';
            let amount = 0;

            if (handStrength > 0.7) {
                // 强牌：加注或跟注
                if (randomFactor < 0.7 && player.stack > state.current_bet * 2) {
                    action = 'bet';
                    amount = Math.min(player.stack, Math.max(state.current_bet * 2, 50));
                } else if (canCall) {
                    action = 'call';
                } else {
                    action = 'fold';
                }
            } else if (handStrength > 0.4) {
                // 中等牌：跟注或过牌
                if (state.current_bet === player.bet) {
                    action = 'check';
                } else if (canCall) {
                    action = 'call';
                } else {
                    action = 'fold';
                }
            } else {
                // 弱牌：弃牌或过牌
                if (state.current_bet === player.bet) {
                    action = 'check';
                } else if (callAmount <= player.stack * 0.1) {
                    // 小额跟注
                    action = 'call';
                } else {
                    action = 'fold';
                }
            }

            addLog(`机器人 ${player.name} 执行动作: ${action}${amount > 0 ? ' ' + amount : ''}`, 'action');
            
            const data = await callApi('/game/action', 'POST', { action, amount });
            if (data && data.success) {
                addLog(`机器人 ${player.name} ${action} 成功`, 'info');
            }
        }

        // 计算手牌强度（简化版）
        function calculateHandStrength(player, state) {
            if (!player.hand || player.hand.length < 2) return 0;
            
            const card1 = player.hand[0];
            const card2 = player.hand[1];
            
            // 基础手牌强度
            let strength = 0;
            
            // 对子
            if (card1.value === card2.value) strength += 0.3;
            
            // 同花
            if (card1.suit === card2.suit) strength += 0.2;
            
            // 高牌
            strength += (Math.max(card1.value, card2.value) - 2) * 0.02;
            
            // 连牌潜力
            const gap = Math.abs(card1.value - card2.value);
            if (gap <= 1) strength += 0.2;
            else if (gap <= 2) strength += 0.1;
            
            return Math.min(strength, 1);
        }

        // 增强的游戏状态更新函数
        async function enhancedUpdateGameState() {
            const data = await callApi('/game/state?player_id=0');  // 传递玩家ID=0，确保人类玩家手牌可见
            if (!data) return;
            
            renderGameState(data);
            
            // 如果是机器人的回合，自动执行动作
            const activePlayerIndex = data.active_player_index;
            if (activePlayerIndex > 0 && data.game_state !== 'ended' && data.game_state !== 'showdown') {
                const activePlayer = data.players[activePlayerIndex];
                if (activePlayer && activePlayer.status === 'active') {
                    // 延迟执行机器人动作
                    setTimeout(() => robotAI(activePlayerIndex, data), 1000);
                }
            }
        }

        // 页面加载时尝试获取一次状态
        window.onload = enhancedUpdateGameState;
        // 每3秒自动更新一次状态
        setInterval(enhancedUpdateGameState, 3000);
    </script>
</body>
</html>
