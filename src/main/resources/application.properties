# 应用配置
spring.application.name=TexasPoker
server.port=8081
server.address=0.0.0.0

# 日志配置
logging.level.com.texaspoker=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Spring Boot 配置
spring.main.banner-mode=console

# 应用信息
app.name=德州扑克游戏服务器
app.version=1.0.0
app.description=基于Spring Boot的德州扑克游戏后端API
